<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Age Selection</title>

<!-- Google Tag Manager -->
<script>
(function(w,d,s,l,i){w[l]=w[l]||[];w[l].push({'gtm.start':
new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],
j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src=
'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
})(window,document,'script','dataLayer','GTM-W96MDFVC');
</script>
<!-- End Google Tag Manager -->

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #4e73df, #1cc88a);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: #ffffff;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        text-align: center;
        width: 90%;
        max-width: 400px;
    }

    h1 {
        margin-bottom: 30px;
        font-size: 24px;
        color: #333;
    }

    .btn {
        display: block;
        width: 100%;
        padding: 15px;
        margin: 12px 0;
        font-size: 16px;
        font-weight: bold;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .age1 { background-color: #4e73df; color: white; }
    .age2 { background-color: #1cc88a; color: white; }
    .age3 { background-color: #f6c23e; color: white; }
    .age4 { background-color: #e74a3b; color: white; }
</style>
</head>

<body>

<!-- Google Tag Manager (noscript) -->
<noscript>
<iframe src="https://www.googletagmanager.com/ns.html?id=GTM-W96MDFVC"
height="0" width="0" style="display:none;visibility:hidden"></iframe>
</noscript>
<!-- End Google Tag Manager (noscript) -->

<div class="container">
    <h1>Select Your Age Range</h1>

    <button class="btn age1" data-age="18-21">18 - 21</button>
    <button class="btn age2" data-age="21-35">21 - 35</button>
    <button class="btn age3" data-age="35-45">35 - 45</button>
    <button class="btn age4" data-age="45-65">45 - 65</button>
</div>

<script>
document.querySelectorAll(".btn").forEach(function(button) {
    button.addEventListener("click", function() {
        var selectedAge = this.getAttribute("data-age");

        // Push event to GTM
        dataLayer.push({
            event: "age_selected",
            age_range: selectedAge
        });

        alert("You selected age range: " + selectedAge);
    });
});
</script>

</body>
</html>
